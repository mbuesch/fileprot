<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" width="760" height="300">
  <defs>
    <marker id="a" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="760" height="300" fill="#f8fafc"/>

  <!-- Application -->
  <rect x="20" y="90" width="130" height="56" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="85" y="113" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1d4ed8">Application</text>
  <text x="85" y="131" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#3b82f6">open/read/write/...</text>
  <text x="85" y="144" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#3b82f6" font-style="italic">/mnt/protected/</text>

  <!-- fileprotd -->
  <rect x="295" y="90" width="170" height="56" rx="6" fill="#fed7aa" stroke="#fb923c" stroke-width="1.5"/>
  <text x="380" y="113" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#92400e">fileprotd</text>
  <text x="380" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#b45309">FUSE daemon (root)</text>
  <text x="380" y="143" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#b45309">approval cache</text>

  <!-- fileprot GUI -->
  <rect x="580" y="90" width="160" height="56" rx="6" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
  <text x="660" y="113" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#15803d">fileprot</text>
  <text x="660" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#166534">tray GUI</text>
  <rect x="590" y="150" width="60" height="20" rx="4" fill="#22c55e"/>
  <text x="620" y="164" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">Approve</text>
  <rect x="660" y="150" width="70" height="20" rx="4" fill="#ef4444"/>
  <text x="695" y="164" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">Reject</text>

  <!-- Backing storage -->
  <rect x="315" y="230" width="130" height="44" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="380" y="250" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#475569">Backing dir</text>
  <text x="380" y="266" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">root-only on host</text>

  <!-- App -> fileprotd: FUSE syscall -->
  <line x1="150" y1="111" x2="293" y2="111" stroke="#475569" stroke-width="1.4" marker-end="url(#a)"/>
  <text x="222" y="105" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#374151">FUSE syscall</text>

  <!-- fileprotd -> App: result -->
  <line x1="293" y1="125" x2="150" y2="125" stroke="#475569" stroke-width="1.4" stroke-dasharray="4,2" marker-end="url(#a)"/>
  <text x="222" y="138" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#374151">data / EPERM</text>

  <!-- fileprotd -> GUI: D-Bus request -->
  <line x1="465" y1="112" x2="578" y2="112" stroke="#475569" stroke-width="1.4" marker-end="url(#a)"/>
  <text x="522" y="106" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#374151">D-Bus request</text>

  <!-- GUI -> fileprotd: approve/reject -->
  <line x1="578" y1="128" x2="465" y2="128" stroke="#475569" stroke-width="1.4" stroke-dasharray="4,2" marker-end="url(#a)"/>
  <text x="522" y="143" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#374151">approve / reject</text>

  <!-- fileprotd -> Backing -->
  <line x1="380" y1="146" x2="380" y2="228" stroke="#475569" stroke-width="1.4" stroke-dasharray="4,2" marker-end="url(#a)"/>
  <text x="415" y="193" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#374151">if approved</text>
</svg>
