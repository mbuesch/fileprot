<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow the daemon process user to own the bus name and send signals -->
  <policy user="root">
    <allow own="ch.bues.fileprot.Daemon"/>
    <allow send_destination="ch.bues.fileprot.Daemon"/>
    <allow send_interface="ch.bues.fileprot.AccessControl"/>
  </policy>

  <!-- Allow any user to call daemon methods and receive signals.
       Access to individual requests is restricted in application code:
       GetPendingRequests and RespondToRequest only operate on requests
       whose FUSE-reported UID matches the caller's Unix UID, preventing
       cross-user approval bypass and information disclosure. -->
  <policy context="default">
    <allow send_destination="ch.bues.fileprot.Daemon"/>
    <allow receive_sender="ch.bues.fileprot.Daemon"/>
  </policy>
</busconfig>
